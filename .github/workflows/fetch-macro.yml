name: Fetch Macro

on:
  schedule:
    # Once daily at 08:00 UTC (before US market open)
    - cron: "0 8 * * 1-5"
  workflow_dispatch: # allow manual runs

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch macro indicators
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_macro.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add data/macro.json
          git diff --cached --quiet || git commit -m "chore: update macro indicators [skip ci]"
          git push
